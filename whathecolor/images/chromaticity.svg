<script>
function hashchange() {

	let ids = location.hash.slice(1).split("-");
	for (let space of document.querySelectorAll(".color-space")) {
		space.classList.toggle("show", ids.includes(space.id) || ids.includes("all"));
	}
}

hashchange();
window.addEventListener("hashchange", hashchange);
</script>

