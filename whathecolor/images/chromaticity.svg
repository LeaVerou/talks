<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -600 700 590" overflow="visible">
<desc>Show u*,v* UCS diagram</desc>
<style>
text {
	font: bold 160%/1.5 Helvetica Neue, Segoe UI, sans-serif;
	fill: white;
}

.color-space {
	opacity: 0;
	transition: 1s;
}

.color-space:target,
.color-space.show {
	opacity: 1;
}

.color-space polygon {
	fill: none;
	stroke: var(--color, white);
	stroke-width: 3px;
	stroke-linecap: round;
	stroke-linejoin: round;
}

.color-space text {
	fill: var(--color, white);
}

.color-space circle {
	r: 5px;
	fill: var(--color, white);
}

.color-space line {
	stroke: var(--color);
	stroke-width: 2px;
}

#cmyk text {
	font-size: 150%
}

</style>
